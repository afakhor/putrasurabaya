name: Build APK STANDALONE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'  

      # ==========================================
      # 1. LANGKAH KRUSIAL: INSTALL ANDROID NDK C++
      # ==========================================
      - name: Install Android NDK
        run: |
          echo "Installing Android NDK version 25.1.8937393..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      # ==========================================
      # 2. SETUP FLUTTER (Menggunakan 3.24.3 demi SDK 35)
      # ==========================================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'  
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      # ==========================================
      # 3. RUN GENERATOR DATABASE (DRIFT)
      # ==========================================
      - name: Generate Database Code
        run: dart run build_runner build --delete-conflicting-outputs

      # ==========================================
      # 4. GENERATE ICON (Pastikan config sudah ada di pubspec.yaml)
      # ==========================================
    #  - name: Generate Launcher Icons
    #    run: dart run flutter_launcher_icons

      # ==========================================
      # 5. BUILD APK RELEASE
      # ==========================================
      - name: Build APK Release
        run: flutter build apk --release --no-shrink --split-per-abi

      # ==========================================
      # 6. UPLOAD KE ARTIFACTS GITHUB
      # ==========================================
      - name: Upload APK ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-tbmekar
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # ==========================================
      # 7. BIKIN RELEASE OTOMATIS DI GITHUB
      # ==========================================
      - name: Bikin Release Otomatis
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: v1.0.${{ github.run_number }}
          name: UD.PUTRA SURABAYA v1.0.${{ github.run_number }}
          body: |
            UNDUH FILE .APK DI SINI ${{ github.sha }}
            
            Silakan unduh file APK di bawah sesuai dengan arsitektur prosesor HP Anda:
            - **arm64-v8a** (Untuk mayoritas HP Android modern zaman sekarang)
            - **armeabi-v7a** (Untuk HP Android tipe lama)
          token: ${{ secrets.GITHUB_TOKEN }}
