name: Build APK STANDALONE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'  

      # ==========================================
      # 1. LANGKAH KRUSIAL: INSTALL ANDROID NDK C++
      # ==========================================
      - name: Install Android NDK
        run: |
          echo "Installing Android NDK version 25.1.8937393..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      # ==========================================
      # 2. SETUP FLUTTER
      # ==========================================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'  
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # Cukup jalankan pub get agar versinya 100% sama dengan di HP/Termux Anda
      - name: Install dependencies
        run: flutter pub get

      # ==========================================
      # 3. RUN GENERATOR DATABASE (DRIFT)
      # ==========================================
      - name: Generate Database Code
        run: dart run build_runner build --delete-conflicting-outputs


      # ==========================================
      # 5. BUILD APK RELEASE
      # ==========================================
      - name: Build APK Release
        run: flutter build apk --release --no-shrink --split-per-abi

      # ==========================================
      # 6. UPLOAD KE ARTIFACTS GITHUB
      # ==========================================
      - name: Upload APK ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-tbmekar
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # ==========================================
      # KOREKSI: AMBIL TANGGAL & WAKTU WIB SEKARANG
      # ==========================================
      - name: Dapatkan Waktu Rilis WIB
        id: info_waktu
        run: |
          echo "TANGGAL_RELEASE=$(TZ='Asia/Jakarta' date +'%d-%m-%Y %H:%M WIB')" >> $GITHUB_OUTPUT

      # ==========================================
      # 7. BIKIN RELEASE OTOMATIS DI GITHUB
      # ==========================================
      - name: Bikin Release Otomatis
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: v1.0.${{ github.run_number }}
          name: UD.PUTRA SURABAYA v1.0.${{ github.run_number }}
          body: |
           UD. PUTRA SURABAYA/BP.DEDDY CLIENT BABE.INFO <details><summary><b>KLIK🔬 DETAIL</b></summary> CLIENT BABE.INFO KE-5 ${{ github.sha }}
            
            <h2>Silakan unduh file APK di bawah sesuai dengan arsitektur prosesor HP Anda:</h2>
            <ul>
               <li>Aplikasi IPOS diupdate otomatis pada: <b>${{ steps.info_waktu.outputs.TANGGAL_RELEASE }}</b></li>
               <li> - **arm64-v8a** (Untuk mayoritas HP Android modern zaman sekarang)</li>
               <li> - **armeabi-v7a** (Untuk HP Android tipe lama)</li>
            </ul>
          token: ${{ secrets.GITHUB_TOKEN }}
