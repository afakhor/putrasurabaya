name: Build APK STANDALONE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'  

      - name: Install Android NDK
        run: |
          echo "Installing Android NDK version 25.1.8937393..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'  
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # === FIX UTAMA UNTUK DRIFT SEVERE ERROR ===
            - name: Clean build artifacts total
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -rf build/
          rm -f pubspec.lock
          flutter pub get

      - name: Generate Database Code
        run: |
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs
        # Jika masih SEVERE, ganti baris atas dengan:
        # dart run build_runner build --delete-conflicting-outputs --release --build-filter="lib/**"

      - name: Build APK Release
        run: flutter build apk --release --no-shrink --split-per-abi

      - name: Upload APK ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-tbmekar
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Dapatkan Waktu Rilis WIB
        id: info_waktu
        run: |
          echo "TANGGAL_RELEASE=$(TZ='Asia/Jakarta' date +'%d-%m-%Y %H:%M WIB')" >> $GITHUB_OUTPUT

      - name: Bikin Release Otomatis
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: v1.0.${{ github.run_number }}
          name: UD.PUTRA SURABAYA v1.0.${{ github.run_number }}
          body: |
           UD. PUTRA SURABAYA/BP.DEDDY CLIENT BABE.INFO <details><summary><b>KLIK🔬 DETAIL</b></summary> CLIENT BABE.INFO KE-5 ${{ github.sha }}
            
            <h2>Silakan unduh file APK di bawah sesuai dengan arsitektur prosesor HP Anda:</h2>
            <ul>
               <li>Aplikasi IPOS diupdate otomatis pada: <b>${{ steps.info_waktu.outputs.TANGGAL_RELEASE }}</b></li>
               <li> - **arm64-v8a** (Untuk mayoritas HP Android modern zaman sekarang)</li>
               <li> - **armeabi-v7a** (Untuk HP Android tipe lama)</li>
            </ul>
          token: ${{ secrets.GITHUB_TOKEN }}