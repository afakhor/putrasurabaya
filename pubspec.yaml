name: ud_putra_kasir
description: Aplikasi Kasir UD. Putra Surabaya - Mirip Aplikasir
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Database - Drift
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24  # Buat APK Android/iOS
  #drift_web: ^0.2.0              # Buat Web Preview
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # UI & Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  
  # Printer Bluetooth - Hanya jalan di APK
  blue_thermal_printer: ^1.2.3
  
  # Kamera & Foto KTP - Hanya jalan di APK
  image_picker: ^1.1.2
  
  # Barcode Scanner - Hanya jalan di APK
  mobile_scanner: ^5.2.3
  
  # Permission Handler
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  
  # Drift Generator
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  
  # Asset foto/gambar
  assets:
    - assets/images/
    - assets/icons/
  
  # Font custom kalau ada
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf