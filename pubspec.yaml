name: ud_putra_kasir
description: Aplikasi Kasir UD. Putra Surabaya - Mirip Aplikasir
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  drift: ^2.23.1
  drift_flutter: ^0.2.1
  path_provider: ^2.1.2
  sqlite3_flutter_libs: ^0.1.4
  path: ^1.9.0
  print_bluetooth_thermal: ^1.0.3
  esc_pos_utils_plus: ^1.1.0
  image_picker: ^1.0.7
  mobile_scanner: ^5.2.0
  permission_handler: ^11.3.1
  intl: ^0.19.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  
  # Drift Generator
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  
  # Asset foto/gambar
  assets:
    - assets/images/
    - assets/icons/
  
